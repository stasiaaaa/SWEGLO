<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sweden Global Relations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; display: flex; }
        #map { height: 100vh; width: 75%; }
        #sidebar {
            width: 25%;
            padding: 20px;
            background: #f4f4f4;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>Sweden & the World</h2>    
        <hr>
            <div id="sidebar-content">
                <p>Click a country to see its relationship with Sweden.</p>
            </div>
        <hr>
        
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="country_codes.js"></script>

    <script>
        const map = L.map('map', {
            setView: [20, 0],
            minZoom: 2,
            maxZoom: 10,
            maxBounds: [[-90, -180], [90, 180]],
            maxBoundsViscosity: 1.0 //Hard wall. no loop
        }).setView([20, 0], 2);

        const baseMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Create NATO layer separately
        let natoLayer = L.geoJSON(null, {
            style: { fillColor: 'blue', fillOpacity: 0.5, color: '#555', weight: 1 }
        });

        let geoLayer;

        fetch('countries.geojson')
            .then(response => response.json())
            .then(data => {
                geoLayer = L.geoJson(data, {
                    style: {
                        color: '#555',
                        weight: 1,
                        fillOpacity: 0.1
                    },
                    onEachFeature: function(feature, layer) {
                        layer.on('click', function() {
                            const countryName = feature.properties.name;
                            showRelations(countryName);
                        });
                        layer.on('mouseover', function() {
                            layer.setStyle({ fillOpacity: 0.4 });
                        });
                        layer.on('mouseout', function() {
                            layer.setStyle({ fillOpacity: 0.1 });
                        });
                    }
                }).addTo(map);

                fetch('http://localhost:5000/api/nato')
                .then(response => response.json())
                .then(natoCountries => {
                    const natoNames = natoCountries.map(c => c.country);
                    geoLayer.eachLayer(function(layer) {
                        if (natoNames.includes(layer.feature.properties.name)) {
                            natoLayer.addData(layer.feature);
                        }
                    });
                });

            });

        

        function showRelations(countryName) {
            const sidebar = document.getElementById('sidebar-content');
            sidebar.innerHTML = `<p>Loading ${countryName}...</p>`; 

            const countryCode = COUNTRY_CODES[countryName];

            // Guard for countries not in country_codes.js
            const militaryPromise = countryCode 
                    ? fetch(`http://localhost:5000/api/military/${countryCode}`).then(r => r.json())
                    : Promise.resolve({ error: 'No code found' });

            Promise.all([
                fetch(`http://localhost:5000/api/nato/${countryName}`).then(r => r.json()),
                militaryPromise
            ]).then(([ nato, military]) => {
    
                const natoStatus = nato.nato_member ? '✅ Yes' : '❌ No';
                const militaryValue = military.value 
                    ? `${military.value.toFixed(2)}% of GDP (${military.year})` 
                    : 'No data';
                
                
                sidebar.innerHTML = `
                    <h2>${countryName}</h2>
                    <p><b>NATO member:</b> ${natoStatus}</p>
                    <p><b>Military spending:</b> ${militaryValue}</p>
                `;
            });
        }

        L.control.layers(
            {"Base Map": baseMap},
            {"Nato Map": natoLayer}
        ).addTo(map)
    </script>
</body>
</html>
